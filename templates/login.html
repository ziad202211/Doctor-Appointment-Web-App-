{% extends 'base.html' %}
{% block title %}Login — MediBook{% endblock %}

{% block content %}
<div class="auth-wrap fade-in">
  <div class="auth-card">
    <h2>Welcome back</h2>
    <p class="sub">Sign in to manage your appointments.</p>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}" novalidate>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
        <span class="err-msg"></span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required />
        <span class="err-msg"></span>
      </div>

      <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem">Sign In</button>
    </form>

    <div class="divider"></div>

    <p class="form-footer">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
  </div>
</div>
{% endblock %}
