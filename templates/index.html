{% extends 'base.html' %}
{% block title %}MediBook — Book Your Doctor{% endblock %}

{% block content %}
<section class="hero fade-in">
<div class="hero-text">
<h1>Your health,<br><em>scheduled</em><br>with clarity.</h1>
<p>Book verified doctors, manage appointments, and never miss a consultation — all in one place.</p>
<div style="display:flex; gap:1rem; flex-wrap:wrap;">
    <a href="{{ url_for('register') }}" class="btn btn-primary">Book an Appointment</a>
    <a href="{{ url_for('login') }}" class="btn btn-secondary">Sign In</a>
</div>
</div>

<div class="hero-visual">
<div class="hero-card">
    <div class="hero-image">
        <img src="https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?w=400&h=300&fit=crop&auto=format" alt="Doctor consultation" style="width: 100%; height: 200px; object-fit: cover; border-radius: 8px;">
    </div>
</div>
</div>
</section>
{% endblock %}
