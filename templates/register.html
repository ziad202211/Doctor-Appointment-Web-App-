{% extends 'base.html' %}
{% block title %}Register — MediBook{% endblock %}

{% block content %}
<div class="auth-wrap fade-in">
  <div class="auth-card">
    <h2>Create account</h2>
    <p class="sub">Join MediBook and book your first appointment today.</p>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('register') }}" novalidate>
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Ahmed Hassan" required />
        <span class="err-msg"></span>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required />
        <span class="err-msg"></span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="At least 6 characters" required />
        <span class="err-msg"></span>
      </div>

      <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem">Create Account</button>
    </form>

    <div class="divider"></div>

    <p class="form-footer">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
  </div>
</div>
{% endblock %}
